plugins {
    id "com.android.application"
}

android {
    namespace "com.tarimtoptan.android"
    compileSdk 34

    defaultConfig {
        applicationId "com.tarimtoptan.android"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}
